# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini to design the scoring algorithm, implement the regex-based career timeline checks, and debug standard library operations. No candidate data was sent to external LLMs during the execution of the ranker.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage candidate ranking system. Removes 114 honeypot profiles using duration, timeline, and founding year constraints (specifically Krutrim/Sarvam AI before 2023). Applies hard disqualifications for pure research, consulting-only, and CV-only backgrounds. Remaining candidates are ranked using a Technical Fit Score (experience, vector search, retrieval, and evaluation metrics) multiplied by an engagement-based Behavioral Signal Score.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
